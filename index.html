<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Access Key</title>

<style>
body{
background:#050505 radial-gradient(circle at center,#111 0%,#000 100%);
color:#fff;
font-family:Inter,system-ui,sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0
}
.card{
background:rgba(255,255,255,.03);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.1);
border-radius:15px;
padding:28px;
width:360px;
text-align:center
}
.tabs{
display:flex;
gap:6px;
margin-bottom:18px
}
.tab{
flex:1;
padding:10px;
font-size:11px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
border-radius:8px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
color:#aaa
}
.tab.active{
background:#fff;
color:#000
}
.tag{
font-size:10px;
letter-spacing:2px;
color:#444;
margin-bottom:12px;
text-transform:uppercase
}
#key{
font-size:22px;
font-weight:800;
min-height:48px;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
text-align:center
}
.code{
font-size:11px;
font-family:ui-monospace,monospace;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
padding:12px;
border-radius:8px;
word-break:break-all
}
.msg{
font-size:13px;
color:#888
}
button{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:13px;
font-weight:700;
background:#fff;
color:#000;
cursor:pointer
}
button:disabled{opacity:.25}
</style>
</head>

<body>

<div class="card">
<div class="tabs">
<div class="tab active" data-tab="key">Key</div>
<div class="tab" data-tab="script">Script</div>
<div class="tab" data-tab="support">Support</div>
</div>

<div id="keyView">
<div class="tag">Current Key</div>
<div id="key">Complete tasks to get your key</div>

<div id="tasks">

<button id="ytBtn" style="background:#ff0000;color:#fff;margin-bottom:10px">
Subscribe on YouTube
</button>
<div id="ytTimer" style="font-size:11px;color:#555;margin-bottom:10px;display:none">
Please wait <span id="ytCountdown">15</span>s...
</div>

<button id="groupBtn" style="background:#00a2ff;color:#fff;margin-bottom:10px">
Join Roblox Group
</button>
<div id="groupTimer" style="font-size:11px;color:#555;margin-bottom:10px;display:none">
Please wait <span id="groupCountdown">10</span>s...
</div>

</div>

<button id="action" disabled>Get Key</button>
</div>

<div id="scriptView" style="display:none">
<div class="tag">Loadstring</div>
<div class="code" id="script">
loadstring(game:HttpGet("https://raw.githubusercontent.com/nismovxa/acro-hub/main/acro-main"))()
</div>
<button id="copyScript">Copy Script</button>
</div>

<div id="supportView" style="display:none">
<div class="tag">Discord Support</div>
<div class="msg">Join Discord if issues persist.</div>
<button onclick="window.open('https://discord.gg/V3p3S2PkZq','_blank')">
Open Discord
</button>
</div>
</div>

<script>
const tabs=[...document.querySelectorAll(".tab")]
const views={
key:document.getElementById("keyView"),
script:document.getElementById("scriptView"),
support:document.getElementById("supportView")
}

tabs.forEach(t=>{
t.onclick=()=>{
tabs.forEach(x=>x.classList.remove("active"))
t.classList.add("active")
Object.values(views).forEach(v=>v.style.display="none")
views[t.dataset.tab].style.display="block"
}
})

document.getElementById("copyScript").onclick=()=>{
navigator.clipboard.writeText(
document.getElementById("script").innerText.trim()
)
}

const keyURL="https://raw.githubusercontent.com/acroscripts/DKEY/refs/heads/main/Current"
const btn=document.getElementById("action")

const ytBtn=document.getElementById("ytBtn")
const ytTimer=document.getElementById("ytTimer")
const ytCountdownEl=document.getElementById("ytCountdown")

const groupBtn=document.getElementById("groupBtn")
const groupTimer=document.getElementById("groupTimer")
const groupCountdownEl=document.getElementById("groupCountdown")

const ytURL="https://www.youtube.com/@ACROSPLOIT?sub_confirmation=1"
const groupURL="https://www.roblox.com/groups/872405600"

let ytDone=false
let groupDone=false

function checkUnlock(){
if(ytDone && groupDone){
btn.disabled=false
document.getElementById("key").textContent="Click below to get your key"
}
}

ytBtn.onclick=()=>{
window.open(ytURL,"_blank")
ytBtn.disabled=true
ytBtn.style.opacity=".5"
ytBtn.textContent="Subscribed?"
ytTimer.style.display="block"

let sec=15
const iv=setInterval(()=>{
sec--
ytCountdownEl.textContent=sec
if(sec<=0){
clearInterval(iv)
ytTimer.style.display="none"
ytBtn.style.display="none"
ytDone=true
checkUnlock()
}
},1000)
}

groupBtn.onclick=()=>{
window.open(groupURL,"_blank")
groupBtn.disabled=true
groupBtn.style.opacity=".5"
groupBtn.textContent="Joined?"
groupTimer.style.display="block"

let sec=10
const iv=setInterval(()=>{
sec--
groupCountdownEl.textContent=sec
if(sec<=0){
clearInterval(iv)
groupTimer.style.display="none"
groupBtn.style.display="none"
groupDone=true
checkUnlock()
}
},1000)
}

btn.onclick=()=>{
window.open(keyURL,"_blank")
}
</script>

</body>
</html>
